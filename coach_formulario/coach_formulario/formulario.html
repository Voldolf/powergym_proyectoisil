<!DOCTYPE html>
<html lang="es">

<head>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- header -->

        <a href="Coach.html" id="logo">
            <img src="../imagenes/Logo_PG.png" alt="Power Gym" class="logo_img">

        <nav id="menu">

    <form action="" id="registro">

        <p>

        <div class="formulario-botones">
            <input type="button" value="Guardar">
            <a href="Coach.html">Volver</a>
